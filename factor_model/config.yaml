data:
  start_date: "2015-01-01"
  end_date:   "2026-06-30"   # extended 2026-06 for TRUE out-of-sample eval:
                             # everything before 2025-01-01 is the development
                             # period; 2025+ data has never touched any config
  cache_dir:  "cache"

backtest:
  rebalance_freq:   21        # monthly rebalancing (factors are slow-moving)
  warmup_days:      252       # need 1y of history for momentum + vol
  transaction_cost: 0.001     # 10 bps per unit turnover
  borrow_rate_annual: 0.01    # short-borrow fee (added 2026-06, parity with PEAD)
  initial_capital:  1_000_000

portfolio:
  mode:     "long_short"      # long_short | long_only
  quantile: 0.20             # top/bottom 20% (quintile spread)

factors:
  # Validated on the survivorship-free universe:
  #   value   Sharpe +0.41  (robust)
  #   quality Sharpe +0.27  (robust)
  #   momentum Sharpe -0.27 (genuinely weak in sector-neutral large-cap 2015-24)
  #   size    Sharpe +0.26  (was +1.44 with survivorship bias — now ~dead, dropped)
  #   low_vol Sharpe -0.16  (lagged the bull market, dropped)
  # value + quality: +33% total, Sharpe 0.61, maxDD -9.3%, market-neutral,
  # and POSITIVE in 2022 (+6.6%) when the market crashed.
  composite: ["value", "quality"]

universe:
  point_in_time: true        # use historical S&P 500 membership (survivorship fix)

# Out-of-sample split (optional, set via --oos-start CLI flag)
oos_start: null
