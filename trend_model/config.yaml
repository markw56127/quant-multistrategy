data:
  start_date: "2015-01-01"
  end_date:   "2026-06-30"   # same dev(<=2024)/OOS(2025+) split as the equity sleeves
  cache_dir:  "cache"

universe:
  # DEV-SELECTED universe (see TREND_FINDING.md). We tested all six asset
  # classes and measured each one's trend Sharpe on DEVELOPMENT data only
  # (<= 2024). Only equity-index and rates futures showed a positive trend
  # premium in development (eq +0.47, rt +0.46); FX/metals/ag/energy were all
  # negative in dev. The decision below uses ZERO out-of-sample information and
  # is theory-consistent — equity and bond trend are the most-cited, most-robust
  # TSMOM sleeves (MOP 2012). Convenient bonus: equity/rates futures also roll
  # cleanly, whereas the front-month roll glitches were concentrated in exactly
  # the commodity contracts we dropped.
  equities:    ["ES=F", "NQ=F", "YM=F", "RTY=F"]
  rates:       ["ZN=F", "ZB=F", "ZF=F", "ZT=F"]
  # Excluded on the dev-Sharpe rule above (kept here for reproducibility — set
  # them back to re-run the full all-27 book, which nets ~0):
  #   currencies:  ["6E=F", "6J=F", "6B=F", "6A=F", "6C=F"]   # dev Sharpe -0.10
  #   energy:      ["CL=F", "NG=F", "HO=F", "RB=F"]           # dev Sharpe -0.05
  #   metals:      ["GC=F", "SI=F", "HG=F", "PL=F"]           # dev Sharpe -0.41
  #   agriculture: ["ZC=F", "ZW=F", "ZS=F", "KC=F", "SB=F", "CT=F"]  # dev Sharpe -0.20

signal:
  lookbacks_days: [63, 126, 252]   # 3 / 6 / 12-month trend; signal = mean of signs ∈ [-1, 1]

backtest:
  rebalance_freq:    21       # monthly rebalance (trend is slow-moving)
  warmup_days:       252      # need 12 months for the slowest lookback
  vol_window:        60       # trailing days for per-instrument realized vol
  return_clip:       0.15     # roll-gap defense: clip daily returns to ±15%. A
                              # front-month roll (e.g. CL=F +306% on 2020-04-20,
                              # NG=F's 23 spikes) is a non-tradeable artifact, not
                              # P&L — excluded from both vol AND return.
  inst_vol_floor:    0.06     # floor per-instrument ann. vol (no divide-by-tiny → monster weights)
  max_inst_weight:   0.25     # backstop cap on |per-instrument weight|
  inst_vol_target:   0.10     # per-instrument annualized vol budget (equal risk)
  port_vol_target:   0.12     # book-level annualized vol target (typical CTA)
  max_leverage:      3.0      # cap on book gross leverage (no fantasy leverage)
  transaction_cost:  0.0005   # 5 bps per unit turnover (futures are cheap to trade)
  initial_capital:   1_000_000

# Out-of-sample split (optional, set via --oos-start CLI flag), mirrors factor_model
oos_start: null
