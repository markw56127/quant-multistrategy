data:
  # Universe of tickers - hierarchical by sector
  tickers:
    Technology: ["AAPL", "MSFT", "NVDA", "GOOGL", "META", "AMZN", "TSLA", "AMD", "INTC", "ORCL"]
    Energy:     ["XOM", "CVX", "COP", "EOG", "SLB", "MPC", "PSX", "VLO", "OXY", "HAL"]
    Finance:    ["JPM", "BAC", "GS", "MS", "WFC", "C", "BLK", "AXP", "SCHW", "USB"]
    Healthcare: ["JNJ", "UNH", "LLY", "PFE", "ABBV", "MRK", "TMO", "ABT", "DHR", "BMY"]
    Consumer:   ["PG", "KO", "PEP", "MCD", "WMT", "HD", "COST", "NKE", "SBUX", "TGT"]
  sector_etfs: ["XLK", "XLE", "XLF", "XLV", "XLP", "XLY", "XLI", "XLB", "XLU", "XLRE"]
  benchmark: "SPY"
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  interval: "1d"
  cache_dir: "cache/data"

fundamentals:
  enabled: true               # fetch EPS, earnings surprise, analyst estimates
  features:
    - eps_actual
    - eps_surprise_pct        # (actual - estimate) / |estimate| * 100
    - eps_growth_qoq
    - eps_growth_yoy
    - post_earn_ret_5d        # realized 5d return after announcement (historical)
    - analyst_fwd_eps
    - peg_ratio

sentiment:
  provider: "claude"          # "claude" | "finbert"
  claude_model: "claude-sonnet-4-6"
  news_lookback_days: 3
  sentiment_decay: 0.85       # exponential decay for older news
  batch_size: 10

features:
  n_pca_components: 12        # eigen-factors per sector
  n_global_factors: 8         # global latent factors after CCA
  autoencoder:
    input_dim: null            # set dynamically
    hidden_dims: [128, 64, 32]
    latent_dim: 16
    dropout: 0.1
    beta_vae: 1.0              # KL weight for beta-VAE

pde:
  n_latent_factors: 16        # must match autoencoder latent_dim
  dt: 0.01                    # time discretization
  n_grid_points: 50           # spatial grid per dimension (1D projection)
  diffusion_coeff: 0.05       # base σ² in Fokker-Planck
  chaos_sensitivity: 0.1      # Lyapunov-like sensitivity coefficient
  boundary:
    lower: -5.0               # lower bound in latent space (normalized)
    upper:  5.0

pinn:
  hidden_dims: [256, 256, 128, 128, 64]
  activation: "tanh"
  lambda_physics: 1.0         # PDE residual weight (adapted during training if adaptive_weights=true)
  lambda_bc: 0.5              # boundary condition weight
  lambda_ic: 0.5              # initial condition weight
  n_collocation: 2048         # interior collocation points
  n_boundary: 512
  learning_rate: 0.001
  epochs: 5000
  patience: 500
  adaptive_weights: true      # LRA: auto-rebalance λ via gradient norm ratios (Wang et al. 2021)
  adaptive_update_freq: 100   # epochs between λ updates
  adaptive_momentum: 0.9      # EMA momentum for λ updates

rl:
  algorithm: "SAC"            # "SAC" | "PPO" | "TRPO"
  state_dim: null             # set dynamically (latent_dim + pinn_uncertainty + sentiment)
  action_dim: null            # set dynamically (n_assets)
  learning_rate: 0.0003
  gamma: 0.99
  tau: 0.005                  # soft update coefficient (SAC only)
  alpha: 0.2                  # entropy regularization (used if auto_entropy=false)
  auto_entropy: true
  target_entropy_scale: 0.3   # sweep best: 0.3 (Sharpe 1.74); 0.7 consistently underperformed
  log_alpha_min: -5.0         # floor on log α to keep some exploration
  batch_size: 256
  buffer_size: 1000000
  warmup_steps: 500           # ~4 episodes at rebalance_freq=5
  update_freq: 1
  hidden_dims: [512, 256, 256]
  # Reward design (env)
  rebalance_freq: 5           # one env step = N trading days held flat
  dsr_eta: 0.02               # sweep best: 0.02 (paired with tes=0.3 → Sharpe 1.74, maxDD -4.1%)
  reward_scale: 1.0
  pinn_penalty: 0.0           # set >0 to enable action-dependent PINN prior
  dispersion_bonus: 1.0       # std(|w|) bonus: rewards differentiated conviction sizing
  # PPO-specific (used when algorithm="PPO")
  ppo_n_steps: 2048
  ppo_n_epochs: 10
  ppo_clip: 0.2
  ppo_ent_coef: 0.01
  # TRPO-specific (used when algorithm="TRPO")
  trpo_n_steps: 2048
  trpo_cg_steps: 15
  trpo_target_kl: 0.01
  # SB3 total timesteps (PPO/TRPO use timestep-based training, not episode-based)
  sb3_total_timesteps: 500000

optimization:
  mle_method: "L-BFGS-B"
  lagrange_max_iter: 1000
  risk_budget: 0.02           # max daily portfolio VaR (2%)
  target_sharpe: 1.5

risk:
  confidence_levels: [0.95, 0.99]
  n_monte_carlo: 50000
  horizon_days: 20
  lookback_days: 252

backtest:
  initial_capital: 1000000
  transaction_cost: 0.001     # 10bps per trade
  slippage: 0.0005            # 5bps slippage
  max_position_size: 0.10     # max 10% per asset
  rebalance_freq: "weekly"    # "daily" | "weekly" | "monthly"
  n_parallel_workers: 4

visualization:
  port: 8050
  update_interval_ms: 2000
  theme: "plotly_dark"
