data:
  start_date: "2015-01-01"
  end_date:   "2024-12-31"
  cache_dir:  "cache"

backtest:
  rebalance_freq:   20        # rebalance monthly. Weekly churned a 100-name book
                              # (0.59 turnover/wk = 3%/yr cost drag, net Sharpe 0.25).
                              # The 60-day drift doesn't need weekly trading; monthly
                              # cuts turnover ~4x while still capturing the drift.
  drift_window:     60        # trading days a stock stays in book after announcing
                              # (PEAD drift persists ~1-3 months: Bernard-Thomas 1989)
  warmup_days:      252
  transaction_cost: 0.001
  initial_capital:  1_000_000

portfolio:
  quantile:  0.20            # long top / short bottom 20% by SUE
  min_names: 20              # skip rebalances with too few eligible names

oos_start: null
