data:
  universe:
    - NVDA
    - AVGO
    - TSM
    - ASML
    - AMD
    - QCOM
    - AMAT
    - LRCX
    - MU
    - KLAC
    - MRVL
    - INTC
    - TXN
    - ADI
    - NXPI
    - MCHP
    - "ON"
    - MPWR
    - SWKS
    - TER
    - ENTG
    - ACLS
    - ONTO
    - FORM
    - COHU
  sector_etf: "SMH"
  start_date: "2015-01-01"
  end_date:   "2024-12-31"
  cache_dir:  "cache/data"

signals:
  ols_window:       60
  ols_min_periods:  30
  forward_horizon:  40     # 40d horizon: better alignment with quarterly fundamental signals
  vol_window:       21

regime:
  n_states:    3
  n_iter:      300
  vol_window:  21

alpha_model:
  n_estimators:       200    # reduced: 300 trees is too much capacity for 24 stocks
  num_leaves:         15     # reduced: prevents overfitting to small cross-section
  learning_rate:      0.05
  feature_fraction:   0.7    # slightly more aggressive feature dropout
  bagging_fraction:   0.8
  bagging_freq:       5
  min_child_samples:  30     # increased: requires more samples per leaf
  early_stopping_rounds: 40

portfolio:
  n_long:            8
  max_position_size: 0.20
  target_vol:        0.15    # annualised portfolio vol target (vol targeting exposure)
  min_exposure:      0.50    # floor: always at least 50% deployed
  max_exposure:      1.00

backtest:
  initial_capital:    1_000_000
  rebalance_freq:     20
  train_window:       504
  retrain_every_n:    3
  transaction_cost:   0.001
